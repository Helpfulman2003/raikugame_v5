<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #fff; margin:0; }
  .grid {
    position: relative;
    background-image: url('assets/birds_sprites.png');
    background-repeat: no-repeat;
    width: 609px;
    height: 2453px;
  }
  .ruler-y {
    position: absolute;
    left: 0; top: 0; width: 100%; height: 100%; pointer-events: none;
  }
  .ruler-y hr {
    margin: 0; border: none; border-top: 1px solid red; height: 50px;
  }
</style>
</head>
<body>
    <div class="grid">
       <script>
           // Draw horizontal red lines every 50 pixels with text
           for(let i=0; i<2453; i+=50) {
               document.write('<div style="position:absolute; top:'+i+'px; left:0; border-top:1px solid red; width:609px; color:red; font-size:12px; font-weight:bold;">'+i+'</div>');
               document.write('<div style="position:absolute; top:'+i+'px; left:100px; border-top:1px solid red; width:1px; height:100px;"></div>');
           }
       </script>
    </div>
</body>
</html>
